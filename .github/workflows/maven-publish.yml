name: Publish to Maven Central

on:
  release:
    types: [created]

jobs:
  deploy:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        server-id: central
        server-username: MAVEN_CENTRAL_USERNAME
        server-password: MAVEN_CENTRAL_TOKEN
        settings-path: ${{ github.workspace }}

    - name: Import GPG key
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      run: |
        echo "$GPG_PRIVATE_KEY" > private-key.asc
        gpg --batch --import private-key.asc
        rm -f private-key.asc
        echo "use-agent" >> ~/.gnupg/gpg.conf
        echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
        echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf

    - name: Set version from Git tag
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        echo "Tag: $GITHUB_REF_NAME → Version: $TAG_VERSION"
        mvn -f library-core/pom.xml versions:set -DnewVersion=$TAG_VERSION -q

    - name: Publish to Maven Central
      env:
        MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
        MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      run: mvn -f library-core/pom.xml clean deploy -s $GITHUB_WORKSPACE/settings.xml -Dgpg.passphrase=$GPG_PASSPHRASE

